<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED Pipeline Replay — F9: Profile Completeness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1c1917;
  --bg-elevated: #231f1c;
  --bg-card: #2a2521;
  --text: #fafaf9;
  --text-dim: #78736e;
  --text-mid: #a8a29e;
  --prompt: #d97706;
  --pass: #16a34a;
  --warning: #d97706;
  --accent: #6366f1;
  --error: #ef4444;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-serif: 'DM Serif Display', serif;
  --font-sans: 'DM Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem 1rem;
  -webkit-font-smoothing: antialiased;
}

.wrapper {
  width: 100%;
  max-width: 820px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* Terminal chrome */
.terminal {
  background: var(--bg-elevated);
  border-radius: 12px;
  padding: 2rem 2.5rem 2rem;
  min-height: 500px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
}

.terminal-dots {
  position: absolute;
  top: 1rem;
  left: 1.25rem;
  display: flex;
  gap: 6px;
}

.terminal-dots span {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}

.scene-container {
  padding-top: 0.75rem;
  min-height: 440px;
  display: flex;
  flex-direction: column;
}

.scene-container.fade-out { animation: fadeOut 200ms ease forwards; }
.scene-container.fade-in  { animation: fadeIn 200ms ease forwards; }

@keyframes fadeOut { to { opacity: 0; } }
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }

/* ── Stage banner ─────────────────────────────── */
.stage-banner {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
  opacity: 0;
  transition: opacity 200ms ease;
}
.stage-banner.visible { opacity: 1; }

.stage-name {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mid);
}

.stage-rule {
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

.stage-num {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
}

/* ── Agent badge ──────────────────────────────── */
.agent-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0.75rem;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text);
  background: rgba(255,255,255,0.03);
  margin-bottom: 0.5rem;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 200ms ease, transform 200ms ease;
}
.agent-badge.visible {
  opacity: 1;
  transform: translateY(0);
}

.agent-badge .multiplier {
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
}

.agent-badge .wave-label {
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  margin-left: 0.25rem;
}

/* ── Content elements ─────────────────────────── */
.step {
  opacity: 0;
  transition: opacity 200ms ease;
}
.step.visible { opacity: 1; }

.content-line {
  color: var(--text-mid);
  padding-left: 0.25rem;
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.65;
}

.content-line.bright { color: var(--text); }
.content-line.dim    { color: var(--text-dim); }
.content-line.pass   { color: var(--pass); }
.content-line.warn   { color: var(--warning); }
.content-line.err    { color: var(--error); }
.content-line.blue   { color: var(--accent); }
.content-line.indent { padding-left: 1.5rem; }
.content-line.sm     { font-size: 12px; }

/* Callout box (spec quotes, code analysis) */
.callout {
  margin: 0.6rem 0;
  padding: 0.6rem 1rem;
  background: rgba(255,255,255,0.025);
  border-left: 2px solid rgba(255,255,255,0.08);
  border-radius: 0 6px 6px 0;
  opacity: 0;
  transition: opacity 250ms ease;
}
.callout.visible { opacity: 1; }
.callout.warn-border  { border-left-color: var(--warning); }
.callout.pass-border  { border-left-color: var(--pass); }
.callout.err-border   { border-left-color: var(--error); }
.callout.blue-border  { border-left-color: var(--accent); }

.callout-label {
  font-family: var(--font-sans);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
}

.callout-body {
  font-size: 12.5px;
  color: var(--text-mid);
  line-height: 1.6;
  white-space: pre-wrap;
}

.callout-source {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 0.35rem;
  font-style: italic;
}

/* Wave row (for Run scene) */
.wave-row {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  padding: 0.15rem 0;
  font-size: 13px;
  color: var(--text-mid);
}

.wave-row .task-id {
  color: var(--text-dim);
  min-width: 2rem;
}

.wave-row .task-files {
  flex: 1;
  color: var(--text-mid);
}

.wave-row .task-time {
  color: var(--text-dim);
  text-align: right;
  min-width: 4rem;
}

/* Spacer */
.spacer { height: 0.6rem; }
.spacer-lg { height: 1rem; }

/* ── Title block ──────────────────────────────── */
.title-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  text-align: center;
  gap: 0.5rem;
}

.title-block .t-main {
  font-family: var(--font-serif);
  font-size: 2rem;
  color: var(--text-dim);
  letter-spacing: 0.02em;
  margin-bottom: 1rem;
}

.title-block .t-feature {
  font-family: var(--font-serif);
  font-size: 1.75rem;
  color: var(--text);
}

.title-block .t-desc {
  font-family: var(--font-sans);
  font-size: 0.95rem;
  color: var(--text-dim);
  max-width: 380px;
  line-height: 1.5;
}

.title-block .t-stats {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text-mid);
  margin-top: 1.5rem;
}

/* ── Summary box ──────────────────────────────── */
.summary-box {
  margin: 0.75rem auto;
  padding: 1rem 1.5rem;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  display: inline-block;
}

.summary-box .s-line {
  color: var(--text-mid);
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.8;
}

/* Connector arrow between agents */
.connector {
  padding: 0.25rem 0 0.25rem 1.5rem;
  color: var(--text-dim);
  font-size: 12px;
  opacity: 0;
  transition: opacity 200ms ease;
}
.connector.visible { opacity: 1; }

/* ── Progress bar ─────────────────────────────── */
.controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-family: var(--font-sans);
}

.play-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  color: var(--text-dim);
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 150ms ease;
  flex-shrink: 0;
}
.play-btn:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}
.play-btn svg { width: 13px; height: 13px; }

.progress-stages {
  flex: 1;
  display: flex;
  gap: 2px;
  align-items: center;
}

.progress-stage {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0.25rem 0.4rem;
  border-radius: 3px;
  cursor: pointer;
  color: var(--text-dim);
  background: transparent;
  transition: all 150ms ease;
  white-space: nowrap;
}

.progress-stage:hover {
  background: rgba(255,255,255,0.05);
}

.progress-stage.completed {
  color: var(--text-mid);
  background: rgba(99, 102, 241, 0.12);
}

.progress-stage.active {
  color: var(--accent);
  background: rgba(99, 102, 241, 0.15);
}

.scene-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 3rem;
  text-align: right;
}

.hint {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  color: var(--text-dim);
  text-align: center;
  opacity: 0.4;
}

.hint kbd {
  display: inline-block;
  padding: 0.1em 0.35em;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  margin: 0 0.1em;
}

/* Snap-in for checks */
.snap-in {
  display: inline;
  opacity: 0;
  transition: opacity 120ms ease;
}
.snap-in.visible { opacity: 1; }

/* Spinner */
.spinner-line {
  color: var(--text-dim);
  font-size: 13px;
  padding-left: 0.25rem;
  transition: opacity 300ms ease;
}
.spinner-line .spin-char {
  color: var(--prompt);
  margin-right: 0.4rem;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="terminal">
    <div class="terminal-dots"><span></span><span></span><span></span></div>
    <div class="scene-container" id="sc"></div>
  </div>

  <div class="controls">
    <button class="play-btn" id="play-btn" aria-label="Pause">
      <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <div class="progress-stages" id="progress"></div>
    <div class="scene-label" id="scene-label"></div>
  </div>

  <div class="hint">
    <kbd>Space</kbd> pause/play &nbsp; <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────
const SPIN = ['\u280b','\u2819','\u2839','\u2838','\u283c','\u2834','\u2826','\u2827','\u2807','\u280f'];
const SPIN_MS = 80;

const sc = document.getElementById('sc');
const progress = document.getElementById('progress');
const labelEl = document.getElementById('scene-label');
const playBtn = document.getElementById('play-btn');
const pauseIcon = document.getElementById('pause-icon');
const playIcon = document.getElementById('play-icon');

let cur = 0, paused = false, timeouts = [], intervals = [];

function sched(fn, ms) { const t = setTimeout(fn, ms); timeouts.push(t); return t; }
function schedIv(fn, ms) { const i = setInterval(fn, ms); intervals.push(i); return i; }
function clearAll() {
  timeouts.forEach(t => clearTimeout(t)); timeouts = [];
  intervals.forEach(i => clearInterval(i)); intervals = [];
}

// ─── Builders ────────────────────────────────────────────────────────

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function addTo(parent, tag, cls, text) {
  const e = el(tag, cls, text);
  parent.appendChild(e);
  return e;
}

function makeBanner(name, num, total) {
  const b = el('div', 'stage-banner');
  addTo(b, 'span', 'stage-name', name);
  addTo(b, 'span', 'stage-rule');
  addTo(b, 'span', 'stage-num', `stage ${num} of ${total}`);
  return b;
}

function makeBadge(name, extra) {
  const b = el('div', 'agent-badge');
  b.textContent = name;
  if (extra) {
    const s = el('span', 'multiplier', extra);
    b.appendChild(s);
  }
  return b;
}

function makeBadgeWithWave(name, mult, waveText) {
  const b = el('div', 'agent-badge');
  b.textContent = name;
  if (mult) {
    const s = el('span', 'multiplier', mult);
    b.appendChild(s);
  }
  if (waveText) {
    const w = el('span', 'wave-label', waveText);
    b.appendChild(w);
  }
  return b;
}

function makeLine(text, cls) {
  return el('div', `step content-line ${cls || ''}`, text);
}

function makeCallout(label, body, source, borderCls) {
  const c = el('div', `callout ${borderCls || ''}`);
  if (label) addTo(c, 'div', 'callout-label', label);
  addTo(c, 'div', 'callout-body', body);
  if (source) addTo(c, 'div', 'callout-source', source);
  return c;
}

function makeConnector(text) {
  return el('div', 'connector', text || '\u2193');
}

function makeSpacer(lg) {
  return el('div', lg ? 'spacer-lg' : 'spacer');
}

function makeWaveRow(id, files, time) {
  const r = el('div', 'step wave-row');
  addTo(r, 'span', 'task-id', `T${id}`);
  addTo(r, 'span', 'task-files', files);
  addTo(r, 'span', 'task-time', time);
  return r;
}

// ─── Scene Definitions ───────────────────────────────────────────────
// Each scene returns an array of { el, delay, spinner?, spinDuration? }

const STAGE_NAMES = ['', 'Validate', 'Plan', 'Verify', 'Run', 'Review', 'Coherence', 'Integrate'];
const PROGRESS_LABELS = ['Intro', 'Validate', 'Plan', 'Verify', 'Run', 'Review', 'Coherence', 'Integrate', 'Summary'];

function sceneTitle() {
  const wrap = el('div', 'title-block');
  const a = addTo(wrap, 'div', 't-main', 'SPEED Pipeline Replay');
  const b = addTo(wrap, 'div', 't-feature', 'F9: Profile Completeness');
  const c = addTo(wrap, 'div', 't-desc', 'Show builders how complete their profile is.');
  const d = addTo(wrap, 'div', 't-stats', '3 specs  \u2192  7 tasks  \u2192  1 feature  \u2192  18 minutes');
  [a,b,c,d].forEach((x,i) => { x.style.opacity = '0'; x.style.transition = 'opacity 400ms ease'; });
  return [
    { el: wrap, delay: 0, onShow: () => { [a,b,c,d].forEach((x,i) => sched(() => x.style.opacity = '1', i * 500)); }}
  ];
}

function sceneValidate() {
  return [
    { el: makeBanner('Validate', 1, 7), delay: 0, cls: 'stage-banner' },
    { el: makeSpacer(), delay: 200 },
    { el: makeBadge('Deterministic'), delay: 300, cls: 'agent-badge' },
    { el: makeLine('Cross-referenced 3 specs for contradictions and gaps.'), delay: 300 },
    { el: makeSpacer(), delay: 200 },
    { el: makeLine('product/f9-profile-completeness.md    4 user stories, 4 success criteria', 'dim'), delay: 200 },
    { el: makeLine('tech/f9-profile-completeness.md       6 data fields, 2 API fields, 4 decisions', 'dim'), delay: 200 },
    { el: makeLine('design/f9-profile-completeness.md     3 components, 19 tokens, 5 states', 'dim'), delay: 200 },
    { el: makeSpacer(true), delay: 400 },
    { el: makeLine('\u2713 No contradictions', 'pass'), delay: 300 },
    { el: makeLine('\u2713 No missing dependencies', 'pass'), delay: 200 },
    { el: makeLine('\u2713 All acceptance criteria machine-verifiable', 'pass'), delay: 200 },
  ];
}

function scenePlan() {
  return [
    { el: makeBanner('Plan', 2, 7), delay: 0, cls: 'stage-banner' },
    { el: makeSpacer(), delay: 200 },
    { el: makeBadge('Product Guardian'), delay: 300, cls: 'agent-badge' },
    { el: makeLine('Analyzed spec against product vision and 4 personas.'), delay: 200 },
    { el: makeSpacer(), delay: 300 },
    { el: makeCallout('Flagged',
        'profileCompleteness exposed on all UserType\ninstances with no auth gating.\n\nPRD: "completeness visible to other users\nis out of scope \u2014 leaks private information"',
        'specs/product/f9-profile-completeness.md \u00b7 Scope section',
        'warn-border'), delay: 400 },
    { el: makeSpacer(), delay: 300 },
    { el: makeLine('\u2713 Mission-aligned \u00b7 4 personas served', 'pass'), delay: 200 },
    { el: makeLine('\u2713 Feeds Activation KPI \u00b7 70% completion target', 'pass'), delay: 200 },
    { el: makeSpacer(true), delay: 500 },
    { el: makeConnector('then \u2193'), delay: 200 },
    { el: makeSpacer(), delay: 200 },
    { el: makeBadge('Architect'), delay: 300, cls: 'agent-badge' },
    { el: makeLine('Decomposed spec into task DAG with per-task acceptance criteria.'), delay: 200 },
    { el: makeSpacer(), delay: 300 },
    { el: makeLine('7 tasks \u00b7 3 waves \u00b7 max concurrency 3', 'bright'), delay: 300 },
    { el: makeSpacer(), delay: 200 },
    { el: makeLine('Wave 1    T1 Backend resolvers   T2 GraphQL types   T3 Ring component', 'dim'), delay: 200 },
    { el: makeLine('Wave 2    T4 Section (\u2192 T3)     T5 Nudge (\u2192 T3)', 'dim'), delay: 200 },
    { el: makeLine('Wave 3    T6 Settings (\u2192 T2,T4)  T7 Profile (\u2192 T2,T5)', 'dim'), delay: 200 },
    { el: makeSpacer(), delay: 200 },
    { el: makeLine('contract: 6 entities \u00b7 2 core queries', 'dim'), delay: 200 },
  ];
}

function sceneVerify() {
  return [
    { el: makeBanner('Verify', 3, 7), delay: 0, cls: 'stage-banner' },
    { el: makeSpacer(), delay: 200 },
    { el: makeBadge('Plan Verifier'), delay: 300, cls: 'agent-badge' },
    { el: makeLine('Blind audit of the plan. No access to the Architect\u2019s reasoning.'), delay: 200 },
    { el: makeSpacer(), delay: 200 },
    { el: null, delay: 1500, spinner: true, spinText: 'Checking 15 requirements against task coverage\u2026' },
    { el: makeSpacer(), delay: 200 },
    { el: makeLine('15 spec requirements checked', 'bright'), delay: 200 },
    { el: makeLine('15 covered \u00b7 0 gaps \u00b7 0 critical failures', 'pass'), delay: 300 },
    { el: makeSpacer(), delay: 300 },
    { el: makeLine('PC-1  Settings page percentage       \u2192  T3, T4, T6   \u2713', 'dim'), delay: 250 },
    { el: makeLine('PC-2  Missing fields with links      \u2192  T4, T6       \u2713', 'dim'), delay: 200 },
    { el: makeLine('PC-3  Real-time update after save    \u2192  T6           \u2713', 'dim'), delay: 200 },
    { el: makeLine('PC-4  Profile page nudge             \u2192  T5, T7       \u2713', 'dim'), delay: 200 },
    { el: makeSpacer(true), delay: 400 },
    { el: makeLine('verdict: pass \u00b7 no semantic drift', 'pass'), delay: 300 },
  ];
}

function sceneRun() {
  return [
    { el: makeBanner('Run', 4, 7), delay: 0, cls: 'stage-banner' },
    { el: makeSpacer(), delay: 200 },
    { el: makeLine('7 developer agents. 3 waves. Isolated git worktrees.'), delay: 200 },
    { el: makeSpacer(true), delay: 400 },
    // Wave 1
    { el: makeBadgeWithWave('Developer', '\u00d7 3', 'Wave 1 \u00b7 6m 16s'), delay: 300, cls: 'agent-badge' },
    { el: makeWaveRow(1, 'score_service.py, user.py, test_score_service.py', '6m 16s'), delay: 200 },
    { el: makeWaveRow(2, 'types.ts, builders.ts', '2m 09s'), delay: 150 },
    { el: makeWaveRow(3, 'completeness-ring.tsx, completeness-ring.test.tsx', '4m 05s'), delay: 150 },
    { el: makeSpacer(true), delay: 400 },
    // Wave 2
    { el: makeBadgeWithWave('Developer', '\u00d7 2', 'Wave 2 \u00b7 3m 57s'), delay: 300, cls: 'agent-badge' },
    { el: makeWaveRow(4, 'completeness-section.tsx, completeness-section.test.tsx', '3m 33s'), delay: 200 },
    { el: makeWaveRow(5, 'completeness-nudge.tsx, completeness-nudge.test.tsx', '3m 57s'), delay: 150 },
    { el: makeSpacer(true), delay: 400 },
    // Wave 3
    { el: makeBadgeWithWave('Developer', '\u00d7 2', 'Wave 3 \u00b7 6m 51s'), delay: 300, cls: 'agent-badge' },
    { el: makeWaveRow(6, 'settings/page.tsx, settings/page.test.tsx', '6m 51s'), delay: 200 },
    { el: makeWaveRow(7, 'profile-content.tsx, profile-content.test.tsx', '3m 57s'), delay: 150 },
    { el: makeSpacer(true), delay: 600 },
    { el: makeLine('lint \u2713   typecheck \u2713   tests \u2713 1,170 pass', 'pass'), delay: 300 },
    { el: makeSpacer(), delay: 200 },
    { el: makeLine('Wall clock: 18m 15s \u00b7 Agent time: 30m 47s \u00b7 1.7\u00d7 parallelism', 'dim'), delay: 300 },
  ];
}

function sceneReview() {
  return [
    { el: makeBanner('Review', 5, 7), delay: 0, cls: 'stage-banner' },
    { el: makeSpacer(), delay: 200 },
    { el: makeBadge('Reviewer', '\u00d7 7'), delay: 300, cls: 'agent-badge' },
    { el: makeLine('Each diff audited against the original spec, not the task description.'), delay: 200 },
    { el: makeSpacer(), delay: 300 },
    { el: makeLine('T1 \u2717  T2 \u2713  T3 \u2713  T4 \u2717  T5 \u2713  T6 \u2713  T7 \u2713     5 approved \u00b7 2 flagged', 'bright'), delay: 400 },
    { el: makeSpacer(true), delay: 800 },

    // Catch 1: Whitespace divergence
    { el: makeCallout('Spec requirement',

  heading.style.transition = 'opacity 400ms ease';

  const box = addTo(wrap, 'div', 'summary-box');
  const lines = [
    '3 specs written',
    '7 tasks executed in 3 parallel waves',
    '2 bugs caught by spec-driven review',
    '1,170 tests passing',

  const lineEls = lines.map(t => {
    const l = addTo(box, 'div', 's-line', t);

    return l;
  });

const SCENES = [
  { title: 'Intro',     duration: 5000,  build: sceneTitle },
  { title: 'Validate',  duration: 8000,  build: sceneValidate },
  { title: 'Plan',      duration: 18000, build: scenePlan },
  { title: 'Verify',    duration: 12000, build: sceneVerify },
  { title: 'Run',       duration: 18000, build: sceneRun },
  { title: 'Review',    duration: 28000, build: sceneReview },
  { title: 'Coherence', duration: 14000, build: sceneCoherence },
  { title: 'Integrate', duration: 14000, build: sceneIntegrate },
  { title: 'Summary',   duration: 10000, build: sceneSummary },
];

// ─── Progress bar ────────────────────────────────────────────────────

PROGRESS_LABELS.forEach((label, i) => {
  const s = el('div', 'progress-stage', label);
  s.addEventListener('click', () => jumpTo(i));
  progress.appendChild(s);
});

function updateProgress() {
  const kids = progress.children;
  for (let i = 0; i < kids.length; i++) {
    kids[i].className = 'progress-stage';
    if (i < cur) kids[i].classList.add('completed');
    if (i === cur) kids[i].classList.add('active');
  }
  labelEl.textContent = `${cur + 1}/${SCENES.length}`;
}

function updatePlayBtn() {
  pauseIcon.style.display = paused ? 'none' : 'block';
  playIcon.style.display = paused ? 'block' : 'none';
}

// ─── Playback ────────────────────────────────────────────────────────

function playScene(index) {
  clearAll();
  cur = index;
  sc.innerHTML = '';
  sc.classList.remove('fade-out', 'fade-in');
  updateProgress();

  const steps = SCENES[index].build();
  let cum = 0;

  steps.forEach(step => {
    cum += step.delay;
    const d = cum;

    if (step.spinner) {
      // Spinner: show, cycle, then vanish
      const spinLine = el('div', 'spinner-line');
      const spinChar = el('span', 'spin-char', SPIN[0]);
      spinLine.appendChild(spinChar);
      spinLine.appendChild(document.createTextNode(step.spinText));
      sc.appendChild(spinLine);

      sched(() => {
        let f = 0;
        const iv = schedIv(() => {
          f = (f + 1) % SPIN.length;
          spinChar.textContent = SPIN[f];
        }, SPIN_MS);

        sched(() => {
          clearInterval(iv);
          spinLine.style.opacity = '0';
          sched(() => spinLine.remove(), 300);
        }, step.delay);
      }, d);

      cum += step.delay + 300;
      return;
    }

    if (!step.el) return;

    sched(() => {
      sc.appendChild(step.el);
      // Show with appropriate class
      if (step.cls === 'stage-banner') {
        requestAnimationFrame(() => step.el.classList.add('visible'));
      } else if (step.cls === 'agent-badge') {
        requestAnimationFrame(() => step.el.classList.add('visible'));
      } else if (step.el.classList.contains('callout')) {
        requestAnimationFrame(() => step.el.classList.add('visible'));
      } else if (step.el.classList.contains('step')) {
        requestAnimationFrame(() => step.el.classList.add('visible'));
      } else {
        step.el.style.opacity = '1';
      }

      if (step.onShow) step.onShow();
    }, d);
  });

  // Auto-advance
  sched(() => {
    if (index < SCENES.length - 1) transitionTo(index + 1);
  }, SCENES[index].duration);
}

function renderInstant(index) {
  clearAll();
  cur = index;
  sc.innerHTML = '';
  sc.classList.remove('fade-out', 'fade-in');
  updateProgress();

  const steps = SCENES[index].build();
  steps.forEach(step => {
    if (step.spinner || !step.el) return;
    sc.appendChild(step.el);

    if (step.cls === 'stage-banner') step.el.classList.add('visible');
    else if (step.cls === 'agent-badge') step.el.classList.add('visible');
    else if (step.el.classList.contains('callout')) step.el.classList.add('visible');
    else if (step.el.classList.contains('step')) step.el.classList.add('visible');
    else step.el.style.opacity = '1';

    // For title/summary with onShow, show everything instantly
    if (step.onShow) {
      // Find all children with opacity 0 and set to 1
      step.el.querySelectorAll('*').forEach(c => {
        if (c.style.opacity === '0') c.style.opacity = '1';
      });
    }
  });
}

function transitionTo(index) {
  clearAll();
  sc.classList.add('fade-out');
  sched(() => {
    sc.classList.remove('fade-out');
    sc.classList.add('fade-in');
    playScene(index);
    sched(() => sc.classList.remove('fade-in'), 200);
  }, 200);
}

function jumpTo(index) {
  if (index < 0 || index >= SCENES.length) return;
  if (paused) renderInstant(index);
  else transitionTo(index);
}

function togglePause() {
  if (paused) {
    paused = false;
    updatePlayBtn();
    playScene(cur);
  } else {
    paused = true;
    updatePlayBtn();
    clearAll();
    renderInstant(cur);
  }
}

// ─── Controls ────────────────────────────────────────────────────────

playBtn.addEventListener('click', togglePause);

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    togglePause();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (cur < SCENES.length - 1) jumpTo(cur + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (cur > 0) jumpTo(cur - 1);
  }
});

// ─── Start ───────────────────────────────────────────────────────────

playScene(0);
</script>
